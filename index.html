<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Martelo Editor</title>
    
    <!-- Tailwind CSS (Estilização) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração do Tailwind para fontes e cores customizadas se necessário -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 8s ease-in-out infinite',
                        'float-delayed': 'float 8s ease-in-out 4s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) scale(1)' },
                            '50%': { transform: 'translateY(-30px) scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Import Map: Permite usar 'import' no navegador puxando de CDNs -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.263.1"
            }
        }
    </script>

    <!-- Babel Standalone: Compila o JSX do React no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Ajuste fino para scroll suave em toda a página */
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #0a0a0a; /* Fallback bg color */
        }
        
        /* Oculta scrollbar para um visual mais limpo, mas mantém a funcionalidade */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
    </style>
</head>
<body>
    <!-- Onde o React vai montar o site -->
    <div id="root"></div>

    <!-- Código da Aplicação -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Play, Scissors, Film, Monitor, ArrowRight, Mail, Instagram, Linkedin, Menu, X, ChevronDown, Smartphone, Globe, ExternalLink, Hammer } from 'lucide-react';

        // Ícone do WhatsApp
        const WhatsAppIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
            </svg>
        );

        // Componente Inteligente para Animação de Scroll (Fade In + Slide Up)
        const FadeInSection = ({ children, delay = 0, className = "" }) => {
            const [isVisible, setVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        // Quando o elemento entra na tela, marca como visível
                        if (entry.isIntersecting) {
                            setVisible(true);
                            observer.unobserve(entry.target); // Anima só uma vez
                        }
                    });
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" }); // Ativa um pouco antes de aparecer totalmente
                
                if (domRef.current) observer.observe(domRef.current);
                return () => observer.disconnect();
            }, []);

            return (
                <div
                    ref={domRef}
                    className={`transition-all duration-1000 ease-out transform ${isVisible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-12 scale-95'} ${className}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        const Portfolio = () => {
            const [scrolled, setScrolled] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            const [lang, setLang] = useState('pt'); 
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [scrollPos, setScrollPos] = useState(0);

            // Rastrear a posição do mouse e do scroll
            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };
                const handleScroll = () => {
                    setScrollPos(window.scrollY);
                    setScrolled(window.scrollY > 50);
                };
                
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('scroll', handleScroll);
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('scroll', handleScroll);
                };
            }, []);

            // Detectar idioma
            useEffect(() => {
                const userLang = navigator.language || navigator.userLanguage; 
                if (userLang) {
                    const code = userLang.toLowerCase();
                    if (code.startsWith('en')) setLang('en');
                    else if (code.startsWith('es')) setLang('es');
                    else if (code.startsWith('pt')) setLang('pt');
                }
            }, []);

            const scrollToSection = (e, id) => {
                e.preventDefault();
                const element = document.getElementById(id);
                if (element) {
                    const headerOffset = 100;
                    const elementPosition = element.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                    window.scrollTo({
                        top: offsetPosition,
                        behavior: "smooth"
                    });
                    setMenuOpen(false);
                }
            };

            const content = {
                pt: {
                    nav: ['Serviços', 'Sobre', 'Contato'],
                    hero: {
                        subtitle: 'Edição de Impacto • Ritmo Dinâmico • Cortes Precisos • Alta Retenção',
                        title1: 'IMPACTO VISUAL',
                        title2: 'FRAME A FRAME',
                        ctaProject: 'Ver Portfólio (Drive)',
                        ctaContact: 'Orçamento'
                    },
                    services: {
                        items: [
                            { title: "Narrativa e Edição", desc: "Construção de histórias envolventes com ritmo perfeito para manter a audiência hipnotizada." },
                            { title: "Efeitos Visuais", desc: "Transições criativas, textos animados e elementos dinâmicos que prendem o olhar." },
                            { title: "Color & Sound", desc: "Correção de cor profissional e design de som imersivo que ditam a emoção do vídeo." }
                        ]
                    },
                    about: {
                        label: '// O Editor',
                        title1: 'CRIATIVIDADE QUE',
                        title2: 'PRENDE',
                        title3: 'A ATENÇÃO.',
                        p1: 'No mundo digital, cada frame importa. Combinando técnicas avançadas de edição, ritmo acelerado e efeitos visuais, crio vídeos que se destacam no feed e conectam profundamente com a audiência.',
                        p2: 'Especialista em transformar material bruto em conteúdos de alto impacto. Foco total em qualidade visual, retenção e conversão através da arte da edição.',
                        driveLinkText: 'Acessar Portfólio Completo no Drive'
                    },
                    contact: {
                        title: 'VAMOS CRIAR?',
                        desc: 'Precisa elevar o nível visual do seu projeto? Vamos conversar.',
                        cta: 'marteloeditor59@gmail.com'
                    },
                    footer: '© 2025 FrameX Motion & Edits. Todos os direitos reservados.'
                },
                en: {
                    nav: ['Services', 'About', 'Contact'],
                    hero: {
                        subtitle: 'Impactful Editing • Dynamic Pacing • Precise Cuts • High Retention',
                        title1: 'VISUAL IMPACT',
                        title2: 'FRAME BY FRAME',
                        ctaProject: 'View Portfolio (Drive)',
                        ctaContact: 'Get a Quote'
                    },
                    services: {
                        items: [
                            { title: "Narrative & Editing", desc: "Building engaging stories with perfect pacing to keep the audience mesmerized." },
                            { title: "Visual Effects", desc: "Creative transitions, animated texts, and dynamic eye-catching elements." },
                            { title: "Color & Sound", desc: "Professional color grading and immersive sound design that dictate video emotion." }
                        ]
                    },
                    about: {
                        label: '// The Editor',
                        title1: 'CREATIVITY THAT',
                        title2: 'GRABS',
                        title3: 'ATTENTION.',
                        p1: 'In the digital world, every frame matters. Combining advanced editing techniques, fast pacing, and visual effects, I create videos that stand out in the feed and connect deeply with the audience.',
                        p2: 'Specialist in transforming raw footage into high-impact content. Total focus on visual quality, retention, and conversion through the art of editing.',
                        driveLinkText: 'Access Full Portfolio on Drive'
                    },
                    contact: {
                        title: 'LET\'S CREATE?',
                        desc: 'Need to elevate the visual level of your project? Let\'s talk.',
                        cta: 'marteloeditor59@gmail.com'
                    },
                    footer: '© 2025 FrameX Motion & Edits. All rights reserved.'
                },
                es: {
                    nav: ['Servicios', 'Sobre Mí', 'Contacto'],
                    hero: {
                        subtitle: 'Edición de Impacto • Ritmo Dinámico • Cortes Precisos • Alta Retención',
                        title1: 'IMPACTO VISUAL',
                        title2: 'CUADRO A CUADRO',
                        ctaProject: 'Ver Portafolio (Drive)',
                        ctaContact: 'Presupuesto'
                    },
                    services: {
                        items: [
                            { title: "Narrativa y Edición", desc: "Construcción de historias cautivadoras con un ritmo perfecto para mantener a la audiencia hipnotizada." },
                            { title: "Efectos Visuales", desc: "Transiciones creativas, textos animados y elementos dinámicos que atrapan la mirada." },
                            { title: "Color y Sonido", desc: "Corrección de color profesional y diseño de sonido inmersivo que dictan la emoción del video." }
                        ]
                    },
                    about: {
                        label: '// El Editor',
                        title1: 'CREATIVIDAD QUE',
                        title2: 'ATRAPA',
                        title3: 'LA ATENCIÓN.',
                        p1: 'En el mundo digital, cada cuadro importa. Combinando técnicas avanzadas de edición, ritmo acelerado y efectos visuales, creo videos que destacan en el feed y conectan profundamente con la audiencia.',
                        p2: 'Especialista en transformar material bruto en contenidos de alto impacto. Enfoque total en la calidad visual, retención y conversión a través del arte de la edición.',
                        driveLinkText: 'Acceder al Portafolio Completo en Drive'
                    },
                    contact: {
                        title: '¿VAMOS A CREAR?',
                        desc: '¿Necesitas elevar el nivel visual de tu proyecto? Hablemos.',
                        cta: 'marteloeditor59@gmail.com'
                    },
                    footer: '© 2025 FrameX Motion & Edits. Todos os derechos reservados.'
                }
            };

            const servicesData = [
                { icon: <Film className="w-8 h-8" />, ...content[lang].services.items[0] }, 
                { icon: <Smartphone className="w-8 h-8" />, ...content[lang].services.items[1] },
                { icon: <Scissors className="w-8 h-8" />, ...content[lang].services.items[2] },
            ];

            const navLinks = ['serviços', 'sobre', 'contato'];
            const drivePortfolioLink = "https://drive.google.com/drive/folders/18QccIh-NtV-syyuIAWmkGsuc_12Awr09?usp=sharing";

            return (
                <div className="min-h-screen bg-neutral-950 text-neutral-100 font-sans selection:bg-white selection:text-black overflow-x-hidden relative">
                    
                    {/* Elementos Cinemáticos de Fundo (Esferas Flutuantes) */}
                    <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                        {/* Esfera Superior Esquerda */}
                        <div 
                            className="absolute -top-[20%] -left-[10%] w-[50vw] h-[50vw] rounded-full bg-white/5 blur-[120px] animate-float mix-blend-screen"
                            style={{ transform: `translateY(${scrollPos * 0.2}px)` }}
                        ></div>
                        {/* Esfera Inferior Direita */}
                        <div 
                            className="absolute top-[60%] -right-[10%] w-[60vw] h-[60vw] rounded-full bg-neutral-600/10 blur-[150px] animate-float-delayed mix-blend-screen"
                            style={{ transform: `translateY(${-scrollPos * 0.1}px)` }}
                        ></div>
                    </div>

                    {/* Efeito Glow Seguindo o Mouse */}
                    <div 
                        className="pointer-events-none fixed inset-0 z-20 transition-opacity duration-300"
                        style={{
                            background: `radial-gradient(600px circle at ${mousePos.x}px ${mousePos.y}px, rgba(255,255,255,0.06), transparent 40%)`
                        }}
                    />

                    {/* Film Grain Overlay */}
                    <div className="fixed inset-0 pointer-events-none opacity-[0.03] z-50 mix-blend-overlay" 
                        style={{ backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")` }}>
                    </div>

                    {/* Navbar */}
                    <nav className={`fixed top-0 w-full z-40 transition-all duration-700 ease-in-out ${scrolled ? 'bg-black/80 backdrop-blur-md py-4 border-b border-white/10 opacity-100 translate-y-0' : 'bg-transparent py-8 opacity-0 -translate-y-4 pointer-events-none'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            {/* LOGO MARTELO */}
                            <button 
                                onClick={(e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                                className="flex items-center gap-2 text-2xl font-bold tracking-tighter uppercase border-2 border-white px-3 py-1 hover:bg-white hover:text-black transition-colors duration-300 bg-transparent cursor-pointer"
                            >
                                <Hammer className="w-6 h-6 fill-current" />
                                <span>MARTELO</span>
                            </button>

                            {/* Desktop Menu */}
                            <div className="hidden md:flex items-center space-x-8">
                                <div className="flex space-x-12 text-sm font-medium tracking-widest uppercase">
                                    {content[lang].nav.map((item, index) => (
                                        <button 
                                            key={item} 
                                            onClick={(e) => scrollToSection(e, navLinks[index])}
                                            className="hover:text-neutral-400 transition-colors relative group uppercase tracking-widest text-white decoration-0 bg-transparent border-none cursor-pointer"
                                        >
                                            {item}
                                            <span className="absolute -bottom-1 left-0 w-0 h-[1px] bg-white transition-all duration-300 group-hover:w-full"></span>
                                        </button>
                                    ))}
                                </div>
                                
                                {/* Language Switcher Desktop */}
                                <div className="flex items-center gap-2 border-l border-white/20 pl-8 ml-4">
                                    <Globe className="w-4 h-4 text-neutral-500" />
                                    {['pt', 'en', 'es'].map((l) => (
                                        <button 
                                            key={l}
                                            onClick={() => setLang(l)}
                                            className={`text-xs uppercase font-bold tracking-wider hover:text-white transition-colors bg-transparent border-none cursor-pointer ${lang === l ? 'text-white' : 'text-neutral-600'}`}
                                        >
                                            {l}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Mobile Menu Button */}
                            <button className="md:hidden text-white bg-transparent border-none cursor-pointer" onClick={() => setMenuOpen(!menuOpen)}>
                                {menuOpen ? <X /> : <Menu />}
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    {menuOpen && (
                        <div className="fixed inset-0 bg-neutral-950 z-30 flex flex-col justify-center items-center space-y-8 text-2xl font-light uppercase tracking-widest md:hidden animate-in fade-in duration-300">
                            {content[lang].nav.map((item, index) => (
                                <button 
                                    key={item} 
                                    onClick={(e) => scrollToSection(e, navLinks[index])}
                                    className="hover:text-neutral-500 transition-colors bg-transparent border-none cursor-pointer text-white"
                                >
                                    {item}
                                </button>
                            ))}
                            
                            <div className="flex gap-6 mt-8 pt-8 border-t border-white/10 w-40 justify-center">
                                {['pt', 'en', 'es'].map((l) => (
                                    <button 
                                        key={l}
                                        onClick={() => { setLang(l); setMenuOpen(false); }}
                                        className={`text-lg uppercase font-bold bg-transparent border-none cursor-pointer ${lang === l ? 'text-white border-b border-white' : 'text-neutral-600'}`}
                                    >
                                        {l}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Hero Section */}
                    <header className="relative min-h-screen flex items-center justify-center overflow-hidden pb-20 pt-32 md:pt-0">
                        <div className="absolute inset-0 z-0 opacity-20">
                            <div className="absolute inset-0 bg-gradient-to-t from-neutral-950 via-transparent to-neutral-950" />
                        </div>

                        <div className="relative z-10 text-center px-4 max-w-4xl flex flex-col items-center">
                            <FadeInSection delay={100}>
                                <p className="text-neutral-400 tracking-widest md:tracking-[0.3em] text-sm md:text-base mb-6 uppercase text-center">
                                    {content[lang].hero.subtitle}
                                </p>
                            </FadeInSection>
                            
                            <FadeInSection delay={300}>
                                <h1 className="text-5xl md:text-8xl font-bold tracking-tighter mb-8 leading-tight">
                                    {content[lang].hero.title1} <br />
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-neutral-400 to-white italic font-serif inline-block hover:scale-105 transition-transform duration-500">
                                        {content[lang].hero.title2}
                                    </span>
                                </h1>
                            </FadeInSection>

                            <FadeInSection delay={500}>
                                <div className="flex flex-col md:flex-row gap-6 justify-center items-center mt-12">
                                    <a href={drivePortfolioLink} target="_blank" rel="noopener noreferrer" className="group flex items-center gap-3 bg-white text-black px-8 py-4 font-bold uppercase tracking-wider hover:bg-neutral-300 transition-all duration-300 cursor-pointer border-none decoration-0 hover:shadow-[0_0_40px_rgba(255,255,255,0.4)]">
                                        {content[lang].hero.ctaProject}
                                        <ExternalLink className="w-4 h-4 stroke-current group-hover:scale-110 transition-transform" />
                                    </a>
                                    <button onClick={(e) => scrollToSection(e, 'contato')} className="flex items-center gap-3 px-8 py-4 border border-white/30 hover:border-white hover:bg-white/5 transition-all uppercase tracking-wider text-sm bg-transparent text-white cursor-pointer decoration-0">
                                        {content[lang].hero.ctaContact}
                                    </button>
                                </div>
                            </FadeInSection>
                        </div>

                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce opacity-50 pointer-events-none">
                            <ChevronDown className="w-8 h-8" />
                        </div>
                    </header>

                    {/* Services Section */}
                    <section id="serviços" className="py-32 bg-neutral-900 border-y border-white/5 mt-12 md:mt-0 relative overflow-hidden">
                        <div className="container mx-auto px-6 relative z-30">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 text-center md:text-left divide-y md:divide-y-0 md:divide-x divide-white/10">
                                {servicesData.map((service, index) => (
                                    <FadeInSection key={index} delay={index * 200}> {/* Staggered animation: 0ms, 200ms, 400ms */}
                                        <div className="px-4 py-8 md:py-0 hover:bg-white/5 transition-all duration-500 rounded-lg group hover:-translate-y-2 cursor-default h-full">
                                            <div className="mb-6 inline-block p-4 border border-white/20 rounded-full group-hover:bg-white group-hover:text-black group-hover:scale-110 transition-all duration-500 group-hover:shadow-[0_0_30px_rgba(255,255,255,0.3)]">
                                                {service.icon}
                                            </div>
                                            <h3 className="text-xl font-bold uppercase tracking-wider mb-4 group-hover:text-white transition-colors duration-300">{service.title}</h3>
                                            <p className="text-neutral-400 leading-relaxed text-sm group-hover:text-neutral-300 transition-colors duration-300">
                                                {service.desc}
                                            </p>
                                        </div>
                                    </FadeInSection>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* About Section */}
                    <section id="sobre" className="py-24 bg-neutral-950 overflow-hidden">
                        <div className="container mx-auto px-6 flex flex-col md:flex-row items-center gap-16 relative z-30">
                            <div className="md:w-1/2 w-full">
                                <FadeInSection delay={200}>
                                    <div className="relative group p-3 border border-white/20 group-hover:border-white/50 transition-colors duration-500">
                                        <img 
                                            src="https://ik.imagekit.io/mlwzsc2tj/7425267f46e9470d105db8417ad0a89d.jpg" 
                                            alt="Editor Profile" 
                                            className="w-full aspect-square object-cover grayscale contrast-125 group-hover:grayscale-0 transition-all duration-700 hover:scale-[1.02]"
                                        />
                                    </div>
                                </FadeInSection>
                            </div>
                            
                            <div className="md:w-1/2 w-full">
                                <FadeInSection delay={400}>
                                    <h2 className="text-sm font-mono text-neutral-500 mb-6 uppercase tracking-widest">{content[lang].about.label}</h2>
                                    <h3 className="text-3xl md:text-5xl font-bold leading-tight mb-8">
                                        {content[lang].about.title1} <br/>
                                        <span className="font-serif italic text-neutral-400">{content[lang].about.title2}</span> {content[lang].about.title3}
                                    </h3>
                                    <p className="text-neutral-300 mb-6 leading-relaxed">
                                        {content[lang].about.p1}
                                    </p>
                                    <p className="text-neutral-400 mb-8 leading-relaxed text-sm">
                                        {content[lang].about.p2}
                                    </p>
                                    
                                    <div className="mb-8">
                                        <a href={drivePortfolioLink} target="_blank" rel="noopener noreferrer" className="group inline-flex items-center gap-3 bg-white text-black px-6 py-3 font-bold uppercase tracking-wider hover:bg-neutral-300 transition-all duration-300 cursor-pointer border-none decoration-0 text-sm hover:shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                                            {content[lang].about.driveLinkText}
                                            <ExternalLink className="w-4 h-4 stroke-current group-hover:scale-110 transition-transform" />
                                        </a>
                                    </div>

                                    <div className="flex gap-4">
                                        {['After Effects', 'CapCut'].map(tech => (
                                            <span key={tech} className="px-3 py-1 border border-white/20 text-xs uppercase tracking-wider text-neutral-400 hover:text-white hover:border-white/50 transition-colors cursor-default">
                                                {tech}
                                            </span>
                                        ))}
                                    </div>
                                </FadeInSection>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contato" className="py-32 bg-black relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-l from-neutral-900 to-transparent opacity-30 skew-x-12 transform origin-top-right pointer-events-none"></div>

                        <div className="container mx-auto px-6 relative z-10 text-center">
                            <FadeInSection delay={100}>
                                <h2 className="text-5xl md:text-7xl font-bold tracking-tighter mb-8">{content[lang].contact.title}</h2>
                                <p className="text-xl text-neutral-400 mb-12 max-w-2xl mx-auto font-light">
                                    {content[lang].contact.desc}
                                </p>
                            </FadeInSection>
                            
                            <FadeInSection delay={300}>
                                <a href={`mailto:${content[lang].contact.cta}`} className="inline-flex items-center gap-4 text-3xl md:text-5xl border-b-2 border-white hover:border-neutral-500 hover:text-neutral-400 transition-all pb-2 mb-16 break-all decoration-0 text-white group">
                                    <Mail className="w-8 h-8 md:w-12 md:h-12 flex-shrink-0 group-hover:scale-110 transition-transform" />
                                    <span className="text-lg md:text-4xl">{content[lang].contact.cta}</span>
                                </a>
                            </FadeInSection>

                            <FadeInSection delay={500}>
                                <div className="flex flex-col md:flex-row justify-center items-center gap-8">
                                    <a href="https://instagram.com/martelo.editor" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 px-6 py-3 border border-white/10 rounded-full hover:bg-white hover:text-black transition-all duration-300 group decoration-0 text-white hover:scale-105">
                                        <Instagram className="w-6 h-6 group-hover:animate-bounce" />
                                        <span className="uppercase tracking-widest text-sm group-hover:font-medium">@martelo.editor</span>
                                    </a>
                                    <a href="https://wa.link/hqtig2" target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 px-6 py-3 border border-white/10 rounded-full hover:bg-[#25D366] hover:text-white hover:border-[#25D366] transition-all duration-300 group decoration-0 text-white hover:scale-105 hover:shadow-[0_0_20px_rgba(37,211,102,0.4)]">
                                        <WhatsAppIcon className="w-6 h-6 group-hover:animate-bounce" />
                                        <span className="uppercase tracking-widest text-sm group-hover:font-medium">WhatsApp</span>
                                    </a>
                                </div>
                            </FadeInSection>
                        </div>
                    </section>

                    {/* Floating WhatsApp Button */}
                    <a 
                        href="https://wa.link/hqtig2" 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        className="fixed bottom-6 right-6 z-50 bg-[#25D366] text-white p-4 rounded-full shadow-lg hover:bg-[#128C7E] transition-all duration-300 hover:scale-110 flex items-center justify-center group"
                        aria-label="Fale comigo no WhatsApp"
                    >
                        <WhatsAppIcon className="w-8 h-8" />
                        <span className="absolute right-full mr-4 bg-white text-black text-sm font-bold uppercase tracking-wider py-2 px-4 rounded-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity duration-300 whitespace-nowrap shadow-xl">
                            {lang === 'pt' ? 'Fale comigo!' : lang === 'en' ? 'Chat with me!' : '¡Habla conmigo!'}
                        </span>
                    </a>

                    {/* Footer */}
                    <footer className="py-8 bg-black border-t border-white/10 text-center text-neutral-600 text-sm uppercase tracking-widest">
                        <p>{content[lang].footer}</p>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>
</html>
